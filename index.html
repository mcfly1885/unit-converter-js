<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Unit Converter</title>
</head>
<body>
    <div id="container" class="container">
        <div class="box">
            <h2>Unit Converter</h2>
              <select name="" id="unit" style="margin-bottom: 50px;">
                    <option value="default" selected>Select a Unit</option>
                    <option value="length">Length 📏</option>
                    <option value="temperature">Temperature 🌡️</option>
                </select>
            <div class="settings">
                <input type="number" name="" id="x"><span id="selected-unit"></span>
                <select name="" id="Xunit" class="my-select">
                </select>
            </div>
            <span class="gap"></span>
            <div class="result">
                <span id="y"></span>
                 <select name="" id="Yunit" class="my-select">
                </select>
            </div>
        </div>
    </div>
    
    <script type="module" src="temperature.js"></script>
    <script type="module" src="scripts.js"></script>
</body>
</html>
